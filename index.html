<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GCM 현장 장비 지도</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
  #map { width:100%; height:100vh; }
  /* 상단 정보바 */
  #topbar {
    position:fixed; top:0; left:0; right:0; z-index:10;
    background:rgba(13,71,161,0.95); color:#fff;
    padding:10px 14px; font-size:14px; font-weight:600;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    display:flex; justify-content:space-between; align-items:center;
  }
  #topbar .count { font-size:13px; font-weight:400; }
  /* 범례 */
  #legend {
    position:fixed; bottom:16px; left:16px; z-index:10;
    background:#fff; border-radius:10px; padding:10px 12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.25); font-size:13px; line-height:1.8;
  }
  #legend .dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .dot-blue { background:#1E88E5; }
  .dot-red  { background:#C62828; }
  .dot-green{ background:#2E7D32; }
  /* 재조회 버튼 */
  #recenter {
    position:fixed; bottom:16px; right:16px; z-index:10;
    background:#1E88E5; color:#fff; border:none; border-radius:50%;
    width:52px; height:52px; font-size:22px; box-shadow:0 2px 8px rgba(0,0,0,0.3);
    cursor:pointer;
  }
  /* 정보 팝업(인포윈도우) 내용 */
  .iw { padding:10px 12px; min-width:180px; font-size:13px; line-height:1.6; }
  .iw .badge { display:inline-block; padding:2px 8px; border-radius:10px; color:#fff; font-size:12px; font-weight:600; }
  .badge-blue{ background:#1E88E5; } .badge-red{ background:#C62828; }
  .iw .type { color:#666; font-size:12px; }
  .iw .addr { margin-top:4px; font-weight:600; }
  /* 데이터 없음 안내 */
  #empty {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20;
    background:#fff; padding:20px 24px; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.25);
    font-size:14px; color:#333; text-align:center; display:none; max-width:80%;
  }
</style>
</head>
<body>

<div id="topbar">
  <span>GCM 현장 장비 지도</span>
  <span class="count" id="countTxt">불러오는 중...</span>
</div>

<div id="map"></div>

<div id="legend">
  <span class="dot dot-green"></span>내 위치<br>
  <span class="dot dot-blue"></span>처리완료<br>
  <span class="dot dot-red"></span>미처리
</div>

<button id="recenter" title="내 위치로">◎</button>

<div id="empty"></div>

<!-- ⬇️⬇️⬇️ 본인 카카오 JavaScript 키로 교체하세요 (appkey= 뒤) ⬇️⬇️⬇️ -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=여기에_본인_JavaScript_키_입력&autoload=false"></script>
<!-- ⬆️⬆️⬆️ 본인 카카오 JavaScript 키로 교체하세요 ⬆️⬆️⬆️ -->

<script>
// ===== URL 파라미터 읽기 =====
function getParam(name){
  var p = new URLSearchParams(window.location.search);
  return p.get(name);
}

// Power Apps가 넘긴 값
var centerLat = parseFloat(getParam('centerLat'));
var centerLng = parseFloat(getParam('centerLng'));
var rawData   = getParam('data'); // JSON 문자열 (장비 배열)

// 기본 중심 (구리시청 근처) — GPS 없을 때 폴백
var DEFAULT_LAT = 37.5943, DEFAULT_LNG = 127.1296;

kakao.maps.load(function(){
  var hasMyLoc = !isNaN(centerLat) && !isNaN(centerLng);
  var startLat = hasMyLoc ? centerLat : DEFAULT_LAT;
  var startLng = hasMyLoc ? centerLng : DEFAULT_LNG;

  var map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(startLat, startLng),
    level: 5
  });

  // ===== 내 위치 핀 (초록) =====
  if (hasMyLoc) {
    var myImg = makePin('#2E7D32', true);
    new kakao.maps.Marker({
      map: map,
      position: new kakao.maps.LatLng(centerLat, centerLng),
      image: myImg,
      zIndex: 100
    });
    // 내 위치 반경 원 (대략 2km)
    new kakao.maps.Circle({
      map: map,
      center: new kakao.maps.LatLng(centerLat, centerLng),
      radius: 2000,
      strokeWeight: 2, strokeColor:'#1E88E5', strokeOpacity:0.6,
      fillColor:'#1E88E5', fillOpacity:0.05
    });
  }

  // ===== 장비 데이터 파싱 =====
  var devices = [];
  if (rawData) {
    try { devices = JSON.parse(rawData); } catch(e){ devices = []; }
  }

  var countTxt = document.getElementById('countTxt');
  if (!devices || devices.length === 0) {
    countTxt.textContent = '장비 0개';
    var empty = document.getElementById('empty');
    empty.style.display = 'block';
    empty.innerHTML = '표시할 장비가 없습니다.<br>Power Apps에서 「내 주변 조회」 후<br>다시 열어주세요.';
    return;
  }

  countTxt.textContent = '장비 ' + devices.length + '개';

  // 하나의 인포윈도우를 공유 (열고 닫기)
  var iw = new kakao.maps.InfoWindow({ removable:true });
  var bounds = new kakao.maps.LatLngBounds();
  if (hasMyLoc) bounds.extend(new kakao.maps.LatLng(centerLat, centerLng));

  devices.forEach(function(d){
    // 컬럼명 유연 처리 (대소문자/이름 차이 대비)
    var lat = parseFloat(d.MapLat != null ? d.MapLat : (d.lat != null ? d.lat : d.Latitude));
    var lng = parseFloat(d.MapLng != null ? d.MapLng : (d.lng != null ? d.lng : d.Longitude));
    if (isNaN(lat) || isNaN(lng)) return; // 좌표 없으면 건너뜀

    var addr  = d.MapAddr || d.addr || d.설치주소 || '주소 정보 없음';
    var color = d.PinColor || d.color || '#C62828';
    var dbtype= d.DBType || d.type || '';
    var isDone = (color.toUpperCase() === '#1E88E5');

    var marker = new kakao.maps.Marker({
      map: map,
      position: new kakao.maps.LatLng(lat, lng),
      image: makePin(color, false)
    });
    bounds.extend(new kakao.maps.LatLng(lat, lng));

    // 핀 클릭 → 정보 팝업
    kakao.maps.event.addListener(marker, 'click', function(){
      var badge = isDone
        ? '<span class="badge badge-blue">처리완료</span>'
        : '<span class="badge badge-red">미처리</span>';
      var typeTxt = dbtype ? ('<div class="type">'+dbtype+'</div>') : '';
      var html = '<div class="iw">'
               + badge + typeTxt
               + '<div class="addr">'+ escapeHtml(addr) +'</div>'
               + '</div>';
      iw.setContent(html);
      iw.open(map, marker);
    });
  });

  // 모든 핀이 보이도록 화면 맞춤 (내 위치 있으면 그 중심 유지)
  if (!hasMyLoc && devices.length > 0) {
    map.setBounds(bounds);
  }

  // 재조회 버튼 = 내 위치로 이동
  document.getElementById('recenter').addEventListener('click', function(){
    if (hasMyLoc) {
      map.setCenter(new kakao.maps.LatLng(centerLat, centerLng));
      map.setLevel(5);
    } else {
      map.setBounds(bounds);
    }
  });
});

// ===== 핀 이미지 생성 (색상별 SVG) =====
function makePin(hex, isMe){
  var size = isMe ? 26 : 22;
  var svg =
    '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+(size+8)+'" viewBox="0 0 24 32">'
    + '<path d="M12 0C6 0 1 5 1 11c0 8 11 21 11 21s11-13 11-21C23 5 18 0 12 0z" fill="'+hex+'" stroke="#fff" stroke-width="2"/>'
    + '<circle cx="12" cy="11" r="4" fill="#fff"/></svg>';
  var url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  return new kakao.maps.MarkerImage(
    url,
    new kakao.maps.Size(size, size+8),
    { offset: new kakao.maps.Point(size/2, size+8) }
  );
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
</script>
</body>
</html>
